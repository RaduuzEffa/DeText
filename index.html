<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeText | Smart Image Vectorizer</title>
    <meta name="description" content="AI PWA tool pro odstranění textu z obrázků a jeho vektorizaci.">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <!-- Fabric.js pro Canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <!-- Tesseract.js pro OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <!-- pdf-lib pro generování PDF -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- JSZip pro export ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver pro stahování -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <img src="./Logo_DeText.png" alt="DeText Logo" style="width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
                <h1>DeText</h1>
            </div>
            
            <div class="workflow-steps">
                <div class="step active" id="step-upload">
                    <div class="step-number">1</div>
                    <div class="step-details">
                        <h3>Nahrát obrázek</h3>
                        <p>PNG nebo JPG formát</p>
                    </div>
                </div>
                <div class="step" id="step-ocr">
                    <div class="step-number">2</div>
                    <div class="step-details">
                        <h3>Detekce OCR</h3>
                        <p>Rozpoznání textu a pozic</p>
                        <button class="btn btn-primary" id="btn-ocr" disabled>Spustit OCR</button>
                    </div>
                </div>
                <div class="step" id="step-vectorize">
                    <div class="step-number">3</div>
                    <div class="step-details">
                        <h3>Odstranit & Vektorizovat</h3>
                        <p>Vyčištění pozadí a vložení písma</p>
                        <button class="btn btn-primary" id="btn-vectorize" disabled>Vektorizovat</button>
                    </div>
                </div>
                <div class="step" id="step-export">
                    <div class="step-number">4</div>
                    <div class="step-details">
                        <h3>Export</h3>
                        <p>Sloučené PDF nebo ZIP</p>
                        <div class="export-actions">
                            <button class="btn btn-secondary" id="btn-export-pdf" disabled>PDF (Křivky/Text)</button>
                            <button class="btn btn-secondary" id="btn-export-zip" disabled>ZIP (PNG+SVG)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer" style="margin-top: auto; padding-top: 2rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <button class="btn btn-secondary hidden" id="btn-undo">Krok zpět (Zrušit vektorizaci)</button>
                <button class="btn btn-secondary hidden" id="btn-new-task">Nová úloha (Reset)</button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h2>Pracovní plocha</h2>
                <div class="controls">
                    <button class="btn-icon" id="btn-zoom-in" title="Přiblížit">+</button>
                    <button class="btn-icon" id="btn-zoom-out" title="Oddálit">-</button>
                    <button class="btn-icon" id="btn-reset-view" title="Resetovat pohled">O</button>
                </div>
            </header>
            
            <div class="canvas-container" id="canvas-wrapper">
                <!-- Dropzone -->
                <div class="dropzone" id="dropzone">
                    <div class="dropzone-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p>Přetáhněte obrázek sem nebo <span>klikněte pro výběr</span></p>
                        <input type="file" id="file-input" accept="image/png, image/jpeg" hidden>
                    </div>
                </div>
                
                <!-- Fabric Canvas -->
                <canvas id="main-canvas"></canvas>
                
                <!-- Loading Overlay -->
                <div class="loading-overlay hidden" id="loading-overlay">
                    <div class="spinner"></div>
                    <p id="loading-text">Zpracovávám...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
